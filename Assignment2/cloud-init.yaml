#cloud-config

package_update: true

packages:
- httpd

runcmd:
- systemctl enable httpd
- systemctl start httpd

write_files:
  - path: /var/www/html/index.html
    content: |
      <h1>Hello from Cloud-Init!</h1>
      <p>This EC2 instance was configured automatically using Terraform and cloud-init.</p>

